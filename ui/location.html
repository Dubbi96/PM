<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM Location — RSSI Mesh Detection Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300ff88' stroke-width='2' stroke-linecap='round'><path d='M12 2v8'/><circle cx='12' cy='14' r='4'/><path d='M12 18v4'/><path d='M8 14h-4'/><path d='M20 14h-4'/></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://esm.sh">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Import map: React + ReactDOM via esm.sh (single instance for app + MUI) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/": "https://esm.sh/react@18.2.0/",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/": "https://esm.sh/react-dom@18.2.0/",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
    }
  }
  </script>

  <style>
    /* ============================================================
       PM Location Dashboard — Dark Theme + Green Neon
       MUI + React via CDN — RSSI Mesh Detection
       ============================================================ */

    /* Fonts loaded via <link> tag in <head> — no @import needed */

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      height: 100vh;
      width: 100vw;
    }

    /* ---- Scrollbar (dark) ---- */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* ---- Green Neon Effects ---- */
    .neon-green {
      color: #00ff88;
      text-shadow: 0 0 7px #00ff88, 0 0 10px #00ff88, 0 0 21px #00ff88, 0 0 42px #00c853;
    }

    .neon-green-subtle {
      color: #00ff88;
      text-shadow: 0 0 5px rgba(0, 255, 136, 0.5), 0 0 10px rgba(0, 255, 136, 0.2);
    }

    .neon-glow {
      box-shadow: 0 0 5px #00ff88, 0 0 10px rgba(0, 255, 136, 0.3);
    }

    .neon-glow-border {
      border: 1px solid rgba(0, 255, 136, 0.5) !important;
      box-shadow: 0 0 5px rgba(0, 255, 136, 0.2), 0 0 10px rgba(0, 255, 136, 0.1), inset 0 0 5px rgba(0, 255, 136, 0.05);
    }

    .neon-pulse {
      animation: neonPulse 2s ease-in-out infinite;
    }

    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 5px #00ff88, 0 0 10px rgba(0, 255, 136, 0.3); }
      50% { box-shadow: 0 0 10px #00ff88, 0 0 20px rgba(0, 255, 136, 0.5), 0 0 30px rgba(0, 255, 136, 0.2); }
    }

    @keyframes neonTextPulse {
      0%, 100% {
        text-shadow: 0 0 7px #00ff88, 0 0 10px #00ff88, 0 0 21px #00ff88, 0 0 42px #00c853;
      }
      50% {
        text-shadow: 0 0 10px #00ff88, 0 0 15px #00ff88, 0 0 30px #00ff88, 0 0 60px #00c853;
      }
    }

    @keyframes strongNeonPulse {
      0%, 100% {
        text-shadow: 0 0 10px #00ff88, 0 0 15px #00ff88, 0 0 30px #00ff88, 0 0 60px #00c853;
        box-shadow: 0 0 10px rgba(0,255,136,0.4), 0 0 20px rgba(0,255,136,0.2);
      }
      50% {
        text-shadow: 0 0 15px #00ff88, 0 0 25px #00ff88, 0 0 50px #00ff88, 0 0 80px #00c853;
        box-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.3);
      }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes eventEnter {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    /* Canvas containers must not be React-managed */
    .canvas-host {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .canvas-host canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Diagnostic canvas sizing */
    .diag-canvas-wrap canvas {
      width: 100%;
      height: 60px;
      display: block;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0,255,136,0.1);
      border-top: 3px solid #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading overlay (shown while ESM modules load) -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <p style="color:#64748b; margin-top:16px; font-family:Inter,sans-serif; font-size:0.8rem;">대시보드 로딩 중...</p>
  </div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Canvas elements kept OUTSIDE React to avoid reconciliation conflicts -->
  <!-- They will be portaled / moved into React containers via refs -->

  <script type="module">
  /* ================================================================
     PM Location Dashboard — React + MUI Dark Theme + Green Neon
     ESM via importmap + esm.sh (no Babel, no UMD)
     RSSI Mesh Detection Model
     ================================================================ */

  // React via importmap (single instance — MUI's 'react' imports resolve here too)
  import React from 'react';
  import { useState, useEffect, useRef, useCallback, useMemo } from 'react';
  import { createRoot } from 'react-dom/client';

  // MUI — ?external=react,react-dom means MUI does `import from 'react'`
  // which the importmap resolves to the same esm.sh/react@18.2.0 = single instance
  const {
    ThemeProvider, createTheme, CssBaseline,
    Box, Typography, Paper, Chip, IconButton, LinearProgress,
    Avatar, Badge, Card, CardContent, Grid, Stack, Divider,
    List, ListItem, ListItemIcon, ListItemText,
    AppBar, Toolbar, Tooltip, Alert, Button
  } = await import('https://esm.sh/@mui/material@5.15.20?external=react,react-dom');

  // Expose React globally for signal-mesh.js, app.js, etc.
  window.React = React;

  // Hide loading overlay
  const _loadEl = document.getElementById('loading-overlay');
  if (_loadEl) _loadEl.classList.add('hidden');

  // ---- Dark Theme ----
  const darkTheme = createTheme({
    palette: {
      mode: 'dark',
      background: {
        default: '#0a0f1a',
        paper: '#111827',
      },
      primary: { main: '#00ff88' },
      secondary: { main: '#6366f1' },
      success: { main: '#00ff88' },
      warning: { main: '#fbbf24' },
      error: { main: '#ef4444' },
      text: {
        primary: '#e2e8f0',
        secondary: '#94a3b8',
      },
    },
    typography: {
      fontFamily: '"Inter", "Roboto", sans-serif',
    },
    shape: { borderRadius: 12 },
    components: {
      MuiPaper: {
        styleOverrides: {
          root: {
            backgroundImage: 'none',
            border: '1px solid rgba(255,255,255,0.06)',
          }
        }
      },
      MuiCard: {
        styleOverrides: {
          root: {
            backgroundImage: 'none',
            border: '1px solid rgba(255,255,255,0.06)',
          }
        }
      },
      MuiChip: {
        styleOverrides: {
          root: {
            fontWeight: 500,
          }
        }
      },
      MuiLinearProgress: {
        styleOverrides: {
          root: {
            borderRadius: 4,
            height: 4,
            backgroundColor: 'rgba(255,255,255,0.06)',
          }
        }
      }
    }
  });

  // ---- SVG icon strings (Streamline-style, thin line, minimal) ----
  const SVG_ICONS = {
    arrowRight: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>',
    arrowLeft: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>',
    arrowsHorizontal: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16l-4-4 4-4"/><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/></svg>',
    pulse: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 4 18 3-9h6"/></svg>',
    alertTriangle: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    wifi: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>',
    antenna: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v8"/><circle cx="12" cy="14" r="4"/><path d="M12 18v4"/><path d="M8 14h-4"/><path d="M20 14h-4"/></svg>',
    barChart: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>',
    clock: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    wave: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/></svg>',
  };

  // Helper to create an inline SVG span element
  function svgIcon(svgStr, size) {
    return React.createElement('span', {
      dangerouslySetInnerHTML: { __html: svgStr },
      style: { display: 'inline-flex', alignItems: 'center', width: size || 16, height: size || 16 }
    });
  }

  // ---- Event type metadata (RSSI-based) ----
  const EVENT_META = {
    enter:     { svgIcon: SVG_ICONS.arrowRight, label: '\uC9C4\uC785 \uAC10\uC9C0', color: '#00ff88' },
    exit:      { svgIcon: SVG_ICONS.arrowLeft, label: '\uC774\uD0C8 \uAC10\uC9C0', color: '#64748b' },
    motion:    { svgIcon: SVG_ICONS.arrowsHorizontal, label: '\uD65C\uB3D9 \uAC10\uC9C0', color: '#3b82f6' },
    breathing: { svgIcon: SVG_ICONS.pulse, label: '\uD638\uD761 \uAC10\uC9C0', color: '#14b8a6' },
    alert:     { svgIcon: SVG_ICONS.alertTriangle, label: '\uC774\uC0C1 \uAC10\uC9C0', color: '#ef4444' },
    movement:  { svgIcon: SVG_ICONS.arrowsHorizontal, label: '\uD65C\uB3D9 \uAC10\uC9C0', color: '#3b82f6' },
  };

  // ---- Presence state metadata ----
  const PRESENCE_META = {
    absent:        { label: '\uBD80\uC7AC', color: '#64748b', bgColor: 'rgba(100,116,139,0.12)', borderColor: 'rgba(100,116,139,0.3)', neon: false, pulse: false },
    waiting:       { label: '\uB300\uAE30 \uC911', color: '#fbbf24', bgColor: 'rgba(251,191,36,0.12)', borderColor: 'rgba(251,191,36,0.3)', neon: false, pulse: false },
    present_still: { label: '\uC815\uC9C0 \uAC10\uC9C0', color: '#00ff88', bgColor: 'rgba(0,255,136,0.12)', borderColor: 'rgba(0,255,136,0.3)', neon: true, pulse: false },
    active:        { label: '\uD65C\uB3D9 \uAC10\uC9C0', color: '#00ff88', bgColor: 'rgba(0,255,136,0.18)', borderColor: 'rgba(0,255,136,0.5)', neon: true, pulse: true },
  };

  // ---- Accuracy level helper ----
  function getAccuracyLabel(level) {
    switch(level) {
      case 'none': return '\uBBF8\uC791\uB3D9';
      case 'presence': return '\uC874\uC7AC \uAC10\uC9C0';
      case 'direction': return '\uBC29\uD5A5 \uCD94\uC815';
      case 'approximate': return '\uADFC\uC0AC \uC704\uCE58';
      case 'precise': return '\uC815\uBC00 \uC704\uCE58';
      default: return '--';
    }
  }

  // ---- Relative time helper ----
  function relativeTime(ts) {
    if (!ts) return '\uC544\uC9C1 \uD65C\uB3D9 \uC5C6\uC74C';
    const d = ts instanceof Date ? ts : new Date(ts);
    if (isNaN(d.getTime())) return '--';
    const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diffSec < 5) return '\uBC29\uAE08 \uC804';
    if (diffSec < 60) return diffSec + '\uCD08 \uC804';
    if (diffSec < 3600) return Math.floor(diffSec / 60) + '\uBD84 \uC804';
    return Math.floor(diffSec / 3600) + '\uC2DC\uAC04 \uC804';
  }

  function formatTime(date) {
    if (!date) return '--:--:--';
    const d = date instanceof Date ? date : new Date(date);
    if (isNaN(d.getTime())) return '--:--:--';
    return String(d.getHours()).padStart(2, '0') + ':' +
           String(d.getMinutes()).padStart(2, '0') + ':' +
           String(d.getSeconds()).padStart(2, '0');
  }

  // ================================================================
  // STAT CARD COMPONENT
  // ================================================================
  function StatCard({ icon, label, value, unit, neon, progress, progressColor, children }) {
    return React.createElement(Card, {
      sx: {
        mb: 1.5,
        backgroundColor: '#111827',
        transition: 'border-color 0.3s',
        '&:hover': { borderColor: 'rgba(255,255,255,0.12)' }
      }
    },
      React.createElement(CardContent, { sx: { py: 1.5, px: 2, '&:last-child': { pb: 1.5 } } },
        React.createElement(Stack, { direction: 'row', alignItems: 'center', spacing: 1.5 },
          React.createElement(Box, {
            sx: {
              fontSize: '1.3rem',
              width: 36, height: 36,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              borderRadius: '10px',
              backgroundColor: 'rgba(0,255,136,0.08)',
              flexShrink: 0,
            }
          }, icon),
          React.createElement(Box, { sx: { flex: 1, minWidth: 0 } },
            React.createElement(Typography, {
              variant: 'caption',
              sx: { color: '#94a3b8', fontSize: '0.7rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }
            }, label),
            React.createElement(Stack, { direction: 'row', alignItems: 'baseline', spacing: 0.5 },
              React.createElement(Typography, {
                variant: 'h5',
                className: neon ? 'neon-green' : '',
                sx: {
                  fontWeight: 800,
                  fontSize: '1.2rem',
                  lineHeight: 1.2,
                  color: neon ? '#00ff88' : '#e2e8f0',
                  animation: neon ? 'neonTextPulse 3s ease-in-out infinite' : 'none',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap',
                }
              }, value),
              unit ? React.createElement(Typography, {
                variant: 'caption',
                sx: { color: '#64748b', fontWeight: 500, ml: 0.3 }
              }, unit) : null
            ),
            progress != null ? React.createElement(LinearProgress, {
              variant: 'determinate',
              value: Math.min(100, Math.max(0, progress)),
              sx: {
                mt: 0.7,
                '& .MuiLinearProgress-bar': {
                  backgroundColor: progressColor || '#00ff88',
                  boxShadow: '0 0 6px ' + (progressColor || '#00ff88'),
                }
              }
            }) : null,
            children || null
          )
        )
      )
    );
  }

  // ================================================================
  // PRESENCE BADGE COMPONENT
  // ================================================================
  function PresenceBadge({ state }) {
    const meta = PRESENCE_META[state] || PRESENCE_META.absent;
    return React.createElement(Card, {
      sx: {
        mb: 1.5,
        backgroundColor: '#111827',
        borderColor: meta.borderColor,
        boxShadow: meta.neon ? '0 0 12px rgba(0,255,136,0.15), 0 0 24px rgba(0,255,136,0.05)' : 'none',
        animation: meta.pulse ? 'neonPulse 2s ease-in-out infinite' : 'none',
        transition: 'all 0.4s ease',
      }
    },
      React.createElement(CardContent, { sx: { py: 2, px: 2, '&:last-child': { pb: 2 } } },
        React.createElement(Typography, {
          variant: 'caption',
          sx: { color: '#94a3b8', fontSize: '0.7rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em', mb: 0.5, display: 'block' }
        }, '\uAC10\uC9C0 \uC0C1\uD0DC'),
        React.createElement(Stack, { direction: 'row', alignItems: 'center', spacing: 1.5 },
          React.createElement(Box, {
            sx: {
              width: 14, height: 14, borderRadius: '50%',
              backgroundColor: meta.color,
              boxShadow: meta.neon ? '0 0 8px ' + meta.color + ', 0 0 16px ' + meta.color : 'none',
              animation: meta.pulse ? 'dotPulse 1.5s ease-in-out infinite' : 'none',
            }
          }),
          React.createElement(Typography, {
            variant: 'h5',
            className: meta.neon ? 'neon-green' : '',
            sx: {
              fontWeight: 800,
              fontSize: '1.5rem',
              lineHeight: 1.2,
              color: meta.color,
              animation: meta.pulse ? 'strongNeonPulse 2s ease-in-out infinite' : (meta.neon ? 'neonTextPulse 3s ease-in-out infinite' : 'none'),
            }
          }, meta.label)
        )
      )
    );
  }

  // ================================================================
  // RSSI SIGNAL BAR COMPONENT
  // ================================================================
  function RssiBar({ rssi }) {
    // Map RSSI to signal strength: -30 = excellent, -90 = terrible
    const clamped = Math.max(-90, Math.min(-20, rssi || -90));
    const pct = ((clamped + 90) / 70) * 100;
    const barColor = pct >= 70 ? '#00ff88' : pct >= 40 ? '#fbbf24' : '#ef4444';
    return React.createElement(Box, { sx: { mt: 0.5 } },
      React.createElement(LinearProgress, {
        variant: 'determinate',
        value: Math.min(100, Math.max(0, pct)),
        sx: {
          height: 6,
          borderRadius: 3,
          '& .MuiLinearProgress-bar': {
            backgroundColor: barColor,
            boxShadow: '0 0 6px ' + barColor,
          }
        }
      })
    );
  }

  // ================================================================
  // EVENT ITEM COMPONENT
  // ================================================================
  function EventItem({ event }) {
    const meta = EVENT_META[event.type] || EVENT_META.motion;
    const ts = formatTime(event.ts || new Date());
    return React.createElement(ListItem, {
      dense: true,
      disablePadding: true,
      sx: {
        py: 0.5, px: 1,
        animation: 'eventEnter 0.3s ease',
        borderBottom: '1px solid rgba(255,255,255,0.03)',
      }
    },
      React.createElement(ListItemIcon, { sx: { minWidth: 28 } },
        React.createElement(Box, {
          sx: {
            width: 8, height: 8, borderRadius: '50%',
            backgroundColor: meta.color,
            boxShadow: '0 0 4px ' + meta.color,
            animation: event.type === 'enter' ? 'dotPulse 1.5s ease-in-out 3' : 'none',
          }
        })
      ),
      React.createElement(ListItemText, {
        primary: React.createElement(Stack, { direction: 'row', spacing: 0.5, alignItems: 'center' },
          React.createElement(Typography, {
            variant: 'caption',
            sx: { color: meta.color, fontWeight: 600, fontSize: '0.65rem' }
          }, React.createElement(React.Fragment, null, svgIcon(meta.svgIcon, 14), ' ' + meta.label)),
          event.confidence != null ? React.createElement(Typography, {
            variant: 'caption',
            sx: { color: '#94a3b8', fontSize: '0.6rem' }
          }, Math.round(event.confidence * 100) + '%') : null
        ),
        secondary: React.createElement(Stack, { direction: 'row', justifyContent: 'space-between' },
          React.createElement(Typography, {
            variant: 'caption',
            sx: { color: '#64748b', fontSize: '0.6rem', maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }
          }, event.detail || event.message || ''),
          React.createElement(Typography, {
            variant: 'caption',
            sx: { color: '#475569', fontSize: '0.6rem', fontFamily: '"JetBrains Mono", monospace' }
          }, ts)
        )
      })
    );
  }

  // ================================================================
  // NODE ITEM COMPONENT
  // ================================================================
  function NodeItem({ node, status }) {
    const isConnected = status === 'connected';
    const isAP = node.type === 'wifi-router' || node._nodeType === 'ap';
    return React.createElement(ListItem, {
      dense: true,
      disablePadding: true,

                  id: 'data-source-text',
                  sx: { color: '#e2e8f0', fontSize: '0.6rem', fontFamily: '"JetBrains Mono", monospace' }
                }, getSourceLabel(mode))
              )
            )
          )
        )
      )
    );
  }

  // ---- Mount React App ----
  const container = document.getElementById('root');
  const root = createRoot(container);
  root.render(React.createElement(Dashboard));
  </script>
